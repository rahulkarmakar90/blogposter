services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: <your username>
      POSTGRES_PASSWORD: <your password>
      POSTGRES_DB: <the name of your DB>
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d checkpoint_practice"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
